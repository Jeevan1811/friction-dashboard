<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Friction OS — Kanban Board</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════════
   FRICTION OS — KANBAN WORKFLOW BOARD
   Design: Productive.io × Linear × dark premium SaaS
   ══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* ── Backgrounds ── */
  --bg0:#0a0c12; --bg1:#0e1119; --bg2:#12151f; --bg3:#1a1e2c; --bg4:#1f2436;
  /* ── Borders ── */
  --bd:rgba(255,255,255,0.07); --bd-md:rgba(255,255,255,0.12); --bd-hi:rgba(255,255,255,0.20);
  /* ── Text ── */
  --t1:#f2f4f8; --t2:#c8cdd8; --t3:#8b93a7; --t4:#555e72;
  /* ── Accent (indigo → purple) ── */
  --ind:#6366f1; --pur:#a855f7;
  --acc-bg:rgba(99,102,241,0.12); --acc-bd:rgba(99,102,241,0.28);
  /* ── Priority ── */
  --crit:#f43f5e; --high:#f59e0b; --med:#38bdf8; --low:#34d399;
  /* ── Kanban column accent colours ── */
  --col-todo:#6366f1; --col-inprog:#f59e0b; --col-readyqa:#38bdf8;
  --col-qaprog:#a855f7; --col-done:#34d399;
  /* ── Member colours ── */
  --mc-M:#f43f5e; --mc-J:#f59e0b; --mc-B:#34d399;
  /* ── Shadows ── */
  --sh-sm:0 2px 8px rgba(0,0,0,.30);
  --sh-md:0 4px 20px rgba(0,0,0,.40);
  --sh-lg:0 8px 40px rgba(0,0,0,.50);
  --sh-xl:0 16px 64px rgba(0,0,0,.60);
  --r:8px; --rm:12px; --rl:16px;
  font-family:'Inter','Space Grotesk',system-ui,sans-serif;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}

html,body{height:100%;background:var(--bg0);color:var(--t1);overflow:hidden;}
*{scroll-behavior:smooth}

/* Ambient glows */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 45% at 12% -5%,rgba(99,102,241,.06) 0%,transparent 70%),
    radial-gradient(ellipse 55% 40% at 88% -5%,rgba(168,85,247,.05) 0%,transparent 70%),
    radial-gradient(ellipse 45% 55% at 50% 110%,rgba(56,189,248,.03) 0%,transparent 70%);
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.20)}
/* Column-specific scrollbar — slightly more visible */
.kol-cards::-webkit-scrollbar{width:3px}
.kol-cards::-webkit-scrollbar-track{background:transparent}
.kol-cards::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.kol-cards::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

/* ══════════════════════════════════
   TOPBAR
   ══════════════════════════════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:54px;
  background:rgba(10,12,18,.90);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 22px;gap:0;
  box-shadow:0 1px 0 rgba(255,255,255,.03);
}
.brand{display:flex;align-items:center;gap:11px;margin-right:28px;flex-shrink:0}
.brand-logo{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;
  box-shadow:0 3px 14px rgba(99,102,241,.38);
}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.brand-ver{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);letter-spacing:.05em}
.topnav{display:flex;align-items:center;gap:1px;flex:1;min-width:0}
.nav-btn{
  padding:5px 13px;border-radius:var(--r);font-size:12.5px;font-weight:500;
  color:var(--t3);cursor:pointer;border:none;background:none;transition:all .13s;white-space:nowrap;
}
.nav-btn:hover{color:var(--t1);background:rgba(255,255,255,.05)}
.nav-btn.active{color:var(--t1);background:rgba(99,102,241,.15);font-weight:600}
.tb-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.day-badge{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--t3);
  background:var(--bg2);border:1px solid var(--bd);padding:4px 10px;border-radius:20px;
}
.av-stack{display:flex}
.av{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--bg0);
  display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;cursor:pointer;
  transition:transform .13s;
}
.av:hover{transform:translateY(-2px)}
.av-M{background:rgba(244,63,94,.18);color:var(--mc-M)}
.av-J{background:rgba(245,158,11,.18);color:var(--mc-J)}
.av-B{background:rgba(52,211,153,.18);color:var(--mc-B)}
.btn-add{
  display:flex;align-items:center;gap:7px;padding:7px 15px;border-radius:var(--r);
  background:linear-gradient(135deg,#6366f1,#a855f7);border:none;color:#fff;
  font-size:12.5px;font-weight:600;font-family:'Space Grotesk',sans-serif;cursor:pointer;
  box-shadow:0 2px 12px rgba(99,102,241,.34);transition:all .13s;white-space:nowrap;
}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.50)}

/* ══════════════════════════════════
   LAYOUT SHELL
   ══════════════════════════════════ */
.shell{
  display:flex;
  /* Exactly: full viewport minus topbar */
  height:calc(100vh - 54px);
  position:relative;z-index:1;overflow:hidden;
}

/* ══════════════════════════════════
   SIDEBAR
   ══════════════════════════════════ */
.sidebar{
  width:210px;min-width:210px;
  background:rgba(14,17,25,.70);backdrop-filter:blur(20px);
  border-right:1px solid var(--bd);
  padding:18px 10px;
  display:flex;flex-direction:column;gap:2px;
  overflow-y:auto;flex-shrink:0;
}
.sb-sec{
  font-size:9.5px;font-weight:700;letter-spacing:.10em;color:var(--t4);
  text-transform:uppercase;padding:0 8px;margin:14px 0 5px;
}
.sb-sec:first-child{margin-top:0}
.sb-item{
  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);
  cursor:pointer;border:1px solid transparent;background:none;color:var(--t3);
  font-size:12.5px;font-weight:500;width:100%;text-align:left;transition:all .12s;
}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--t2)}
.sb-item.active{background:rgba(99,102,241,.12);color:var(--ind);font-weight:600;border-color:rgba(99,102,241,.20)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-count{
  margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--t4);
  background:rgba(255,255,255,.05);padding:2px 7px;border-radius:10px;
}
.sb-item.active .sb-count{background:var(--acc-bg);color:var(--ind)}

/* ══════════════════════════════════
   MAIN CONTENT
   ══════════════════════════════════ */
.main{
  flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;
  /* Sidebar + main must not exceed shell height */
  height:100%;
}

/* ── PAGE HEADER ── */
.page-hdr{
  padding:20px 26px 0;
  display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;
  flex-shrink:0;
}
.page-title{
  font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;
  color:var(--t1);letter-spacing:-.03em;line-height:1.15;
}
.page-title-hl{
  background:linear-gradient(90deg,#6366f1,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);margin-top:3px}
.hdr-acts{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);
  font-size:11.5px;font-weight:500;cursor:pointer;
  border:1px solid var(--bd-md);background:var(--bg2);color:var(--t3);transition:all .12s;
}
.btn:hover{border-color:var(--bd-hi);color:var(--t1);background:var(--bg3)}

/* ── PIPELINE ── */
.pipeline-wrap{padding:14px 26px 0;flex-shrink:0}
.pipe-label{
  font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--t4);text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;
}
.pipe-pct{font-family:'JetBrains Mono',monospace;color:var(--ind);font-weight:500}
.pipeline-track{
  display:flex;align-items:center;
  background:var(--bg2);border:1px solid var(--bd);border-radius:40px;
  padding:5px 8px;overflow-x:auto;gap:0;box-shadow:var(--sh-sm);
}
.pipe-step{display:flex;align-items:center;gap:7px;padding:4px 11px;border-radius:30px;flex-shrink:0;transition:all .15s}
.pipe-step.done  {background:rgba(52,211,153,.07)}
.pipe-step.active{background:rgba(99,102,241,.10)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pdot.done  {background:var(--low)}
.pdot.active{background:var(--ind);animation:pdotpulse 2s infinite}
.pdot.idle  {background:var(--t4)}
@keyframes pdotpulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}50%{box-shadow:0 0 0 5px rgba(99,102,241,0)}}
.pipe-name{font-size:11px;font-weight:600;color:var(--t3)}
.pipe-step.done  .pipe-name{color:var(--low)}
.pipe-step.active .pipe-name{color:var(--ind)}
.pipe-frac{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--t4)}
.pipe-arrow{color:var(--t4);font-size:10px;padding:0 2px;flex-shrink:0}

/* ── STATS ── */
.stats-row{display:flex;gap:10px;padding:12px 26px;flex-wrap:wrap;flex-shrink:0}
.stat-card{
  flex:1;min-width:85px;
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rm);
  padding:13px 15px;display:flex;flex-direction:column;gap:4px;
  box-shadow:var(--sh-sm);transition:all .15s;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:99px 99px 0 0}
.stat-card:hover{border-color:var(--bd-md);box-shadow:var(--sh-md);transform:translateY(-1px)}
.stat-num{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.stat-label{font-size:10.5px;color:var(--t3)}
.stat-bar-wrap{height:2px;background:var(--bd);border-radius:1px;margin-top:6px;overflow:hidden}
.stat-bar{height:100%;border-radius:1px;transition:width .6s ease}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;padding:0 26px 12px;gap:7px;flex-wrap:wrap;flex-shrink:0}
.tl{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.tr{display:flex;gap:6px;align-items:center}
.chip{
  display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;
  font-size:11.5px;font-weight:500;cursor:pointer;
  border:1px solid var(--bd);background:var(--bg2);color:var(--t3);
  transition:all .12s;user-select:none;
}
.chip:hover{border-color:var(--bd-md);color:var(--t2);background:var(--bg3)}
.chip.active{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--ind);font-weight:600}
.cdot{width:6px;height:6px;border-radius:50%}
.minav{width:17px;height:17px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.tdiv{width:1px;background:var(--bd);margin:0 2px;align-self:stretch}
.search-wrap{
  display:flex;align-items:center;gap:7px;padding:5px 11px;
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  font-size:12px;transition:all .12s;
}
.search-wrap:focus-within{border-color:rgba(99,102,241,.38);box-shadow:0 0 0 3px rgba(99,102,241,.07)}
.search-inp{background:none;border:none;outline:none;color:var(--t1);font-size:12px;width:130px;font-family:inherit}
.search-inp::placeholder{color:var(--t4)}

/* ══════════════════════════════════════════════════
   KANBAN BOARD
   ══════════════════════════════════════════════════ */
.kanban-outer{
  overflow-x:hidden;overflow-y:visible;
  padding:0 20px 28px;
}
.kanban-board{
  display:flex;flex-wrap:wrap;gap:14px;
  align-items:flex-start;
  padding-bottom:20px;
}

/* ── COLUMN ── */
.kol{
  flex:1 1 300px;min-width:300px;max-width:calc(25% - 11px);
  display:flex;flex-direction:column;
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);
  overflow:hidden;box-shadow:var(--sh-sm);
  transition:border-color .15s,background .15s,box-shadow .15s;
  height:auto;
}
.kol.drag-target{
  border-color:rgba(99,102,241,.45)!important;
  background:rgba(99,102,241,.04);
  box-shadow:0 0 0 3px rgba(99,102,241,.10),var(--sh-sm);
}
.kol-hdr{
  padding:13px 15px 11px;
  display:flex;align-items:center;gap:9px;
  border-bottom:1px solid var(--bd);
  /* FIXED — never scrolls away */
  flex-shrink:0;
  background:var(--bg3);
  position:sticky;top:0;z-index:2;
}
.kol-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kol-title{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--t2);flex:1}
.kol-count{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;color:var(--t4);
  background:rgba(255,255,255,.05);border:1px solid var(--bd);padding:2px 8px;border-radius:20px;
}
.kol-cards{
  max-height:clamp(320px,65vh,860px);
  overflow-y:auto;
  overflow-x:hidden;
  padding:8px 8px 4px;
  display:flex;flex-direction:column;gap:7px;
  min-height:80px;
}
.kol-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  min-height:90px;color:var(--t4);font-size:11.5px;
  border:1.5px dashed rgba(255,255,255,.06);border-radius:var(--rm);margin:4px;
  pointer-events:none;
}
.kol-add-btn{
  flex-shrink:0;margin:5px 8px 8px;
  display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--r);
  border:1px dashed var(--bd);background:none;cursor:pointer;
  color:var(--t4);font-size:11.5px;font-weight:500;
  transition:all .13s;width:calc(100% - 16px);
  font-family:inherit;
}
.kol-add-btn:hover{border-color:rgba(99,102,241,.35);color:var(--ind);background:rgba(99,102,241,.05)}

/* ── DROP PLACEHOLDER ── */
.drop-ph{
  height:70px;border-radius:var(--rm);
  border:2px dashed rgba(99,102,241,.35);
  background:rgba(99,102,241,.05);
  flex-shrink:0;pointer-events:none;
}

/* ══════════════════════════════════
   TASK CARD
   ══════════════════════════════════ */
.kard{
  background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rm);
  padding:12px 13px 11px;cursor:grab;
  transition:border-color .13s,box-shadow .13s,transform .13s,opacity .13s;
  position:relative;
  /* NO overflow:hidden — let card grow with content */
  box-shadow:var(--sh-sm);
  /* Auto height — grows with content, never clips */
  height:auto;
  min-height:72px;
  flex-shrink:0;
}
.kard:hover{border-color:var(--bd-md);box-shadow:var(--sh-md);transform:translateY(-1px)}
.kard.dragging{opacity:.35;transform:scale(.95);cursor:grabbing;box-shadow:none}
.kard.is-done{opacity:.55}
.kard.is-done .kt{text-decoration:line-through;color:var(--t4)}

.khdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.kt{
  /* FULL title — no truncation, no clamp, wraps naturally */
  font-size:12.5px;font-weight:600;color:var(--t1);
  line-height:1.45;
  flex:1;
  white-space:normal;
  word-break:break-word;
  overflow-wrap:break-word;
  /* Remove any inherited single-line constraints */
  overflow:visible;
  text-overflow:unset;
}
.kmenu{opacity:0;transition:opacity .12s;display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.kard:hover .kmenu{opacity:1}
.kbtn{
  width:22px;height:22px;border-radius:5px;
  background:rgba(255,255,255,.04);border:1px solid var(--bd);
  color:var(--t4);cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;transition:all .1s;
}
.kbtn:hover{background:rgba(255,255,255,.08);color:var(--t2);border-color:var(--bd-md)}
.kbtn.del:hover{color:var(--crit);border-color:rgba(244,63,94,.25);background:rgba(244,63,94,.07)}

/* Note: 2-line clamp is intentional — saves space while still readable */
.knote{
  font-size:11px;color:var(--t3);line-height:1.45;margin-bottom:9px;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
  word-break:break-word;
}

.kfoot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
.ppill{
  display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;
}
.ppill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.pr{background:rgba(244,63,94,.12);color:var(--crit);border:1px solid rgba(244,63,94,.20)}
.pa{background:rgba(245,158,11,.12);color:var(--high);border:1px solid rgba(245,158,11,.20)}
.pb{background:rgba(56,189,248,.12);color:var(--med);border:1px solid rgba(56,189,248,.20)}
.pg{background:rgba(52,211,153,.12);color:var(--low);border:1px solid rgba(52,211,153,.20)}

.kav{width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.kav-M{background:rgba(244,63,94,.18);color:var(--mc-M)}
.kav-J{background:rgba(245,158,11,.18);color:var(--mc-J)}
.kav-B{background:rgba(52,211,153,.18);color:var(--mc-B)}

.kdue{font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:auto;padding:2px 7px;border-radius:20px;font-weight:600}
.dok{background:rgba(255,255,255,.04);color:var(--t4)}
.dsoon{background:rgba(245,158,11,.10);color:var(--high)}
.dover{background:rgba(244,63,94,.10);color:var(--crit)}
.ddone{background:rgba(52,211,153,.10);color:var(--low)}

.ksub{font-size:10px;color:var(--t4);font-family:'JetBrains Mono',monospace}

/* ══════════════════════════════════
   MODAL
   ══════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(5,7,12,.72);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--bg2);border:1px solid var(--bd-md);border-radius:var(--rl);
  width:100%;max-width:520px;box-shadow:var(--sh-xl);overflow:hidden;
}
.mhdr{
  padding:20px 22px 16px;border-bottom:1px solid var(--bd);
  display:flex;justify-content:space-between;align-items:flex-start;background:var(--bg3);
}
.mtitle{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--t1)}
.msub  {font-size:11.5px;color:var(--t3);margin-top:3px}
.mx{
  width:26px;height:26px;border-radius:var(--r);background:rgba(255,255,255,.05);
  border:1px solid var(--bd);color:var(--t3);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.mx:hover{color:var(--t1);background:rgba(255,255,255,.09)}
.mbody{padding:20px 22px;display:flex;flex-direction:column;gap:13px}
.mfoot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;background:var(--bg3)}
.frow {display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg   {display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase}
input,textarea,select{
  background:var(--bg1);border:1px solid var(--bd-md);border-radius:var(--r);
  padding:8px 12px;color:var(--t1);font-size:13px;font-family:inherit;
  outline:none;transition:border-color .12s,box-shadow .12s;width:100%;
}
input:focus,textarea:focus,select:focus{border-color:rgba(99,102,241,.50);box-shadow:0 0 0 3px rgba(99,102,241,.10)}
select option{background:var(--bg2);color:var(--t1)}
textarea{min-height:80px;resize:vertical}
input::placeholder,textarea::placeholder{color:var(--t4)}
.auto-badge{
  display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;
  background:rgba(99,102,241,.10);border:1px solid rgba(99,102,241,.24);
  font-size:11px;color:var(--ind);font-weight:600;width:fit-content;
}
.btn-primary{
  display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:var(--r);
  font-size:13px;font-weight:600;cursor:pointer;border:none;
  background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;
  box-shadow:0 2px 10px rgba(99,102,241,.30);transition:all .13s;font-family:'Space Grotesk',sans-serif;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(99,102,241,.48)}

/* ══════════════════════════════════
   TOAST
   ══════════════════════════════════ */
#toast-wrap{
  position:fixed;bottom:22px;right:22px;z-index:300;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:600;color:var(--t1);
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--bd-md);background:var(--bg3);box-shadow:var(--sh-md);
  animation:tslide .2s ease;
}
.tok {border-color:rgba(52,211,153,.25)}
.terr{border-color:rgba(244,63,94,.25)}
.tnfo{border-color:rgba(99,102,241,.25)}
@keyframes tslide{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

/* ── Add task button — always visible, never shrinks ── */
.kol-add-btn{
  flex-shrink:0;
}

@media(max-width:1400px){
  .kol{max-width:calc(33.33% - 10px)}
}
@media(max-width:1200px){
  .kol{max-width:calc(33.33% - 10px)}
}
@media(max-width:1024px){
  .kol{max-width:calc(50% - 7px)}
}
@media(max-width:900px){
  .sidebar{display:none}
  .page-hdr,.pipeline-wrap,.stats-row,.toolbar{padding-left:14px;padding-right:14px}
  .kanban-outer{padding:0 14px 20px}
  .stat-card{min-width:70px}
  .kol{max-width:calc(50% - 7px);min-width:260px}
}
@media(max-width:640px){
  .stats-row{gap:7px}
  .stat-card{padding:10px 12px}
  .stat-num{font-size:16px}
  .kol{flex:1 1 100%;max-width:100%;min-width:0}
}

/* ── LOAD / MIGRATE / SAVE ── */
function loadTasks(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const saved=JSON.parse(raw);
      // Migrate: ensure every task has status
      return saved.map(t=>({...t, status:t.status||'todo', subtasks:t.subtasks||[]}));
    }
  }catch(e){}
  // First load: assign smart initial statuses
  return DEFAULT_TASKS.map((t,i)=>({
    ...t,
    status: i<4 ? 'done' : i<8 ? 'inprog' : i<10 ? 'readyqa' : 'todo',
    subtasks:t.subtasks||[],
  }));
}
function saveTasks(){localStorage.setItem(STORAGE_KEY,JSON.stringify(TASKS))}

let TASKS = loadTasks();

function setMF(v,el){
  MF=v;
  document.querySelectorAll('[data-mf]').forEach(c=>c.classList.toggle('active',c.dataset.mf===v));
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  _stage='';
  renderAll();
}
function togglePF(v,el){
  PF=PF===v?'ALL':v;
  document.querySelectorAll('[data-pf]').forEach(c=>c.classList.toggle('active',c.dataset.pf===PF));
  renderAll();
}
function doSearch(q){SQ=q.toLowerCase();renderBoard()}
function sbFilter(v,el){
  MF=v;
  document.querySelectorAll('[data-mf]').forEach(c=>c.classList.toggle('active',c.dataset.mf===v));
  _stage='';renderAll();
}
function sbPriority(v){togglePF(v,null)}
function sbStage(v){_stage=_stage===v?'':v;renderAll()}

function visible(){
  return TASKS.filter(t=>{
    if(MF!=='ALL'&&t.assignedTo!==MF)return false;
    if(PF!=='ALL'&&t.priority!==PF&&!(PF==='amber'&&t.priority==='yellow'))return false;
    if(SQ&&!t.title.toLowerCase().includes(SQ)&&!(t.note||'').toLowerCase().includes(SQ))return false;
    if(_stage&&t.stage!==_stage)return false;
    return true;
  });
}

/* ═══════════════════════════════════════════════════════
   ██████████████  PIPELINE + STATS  ██████████████████████
   ═══════════════════════════════════════════════════════ */
function renderPipeline(){
  const track=document.getElementById('pipe-track'); if(!track)return;
  const tot={},done={};
  TASKS.forEach(t=>{tot[t.stage]=(tot[t.stage]||0)+1;if(t.status==='done')done[t.stage]=(done[t.stage]||0)+1});
  let html='';
  STAGES.forEach((s,i)=>{
    const t=tot[s.key]||0,d=done[s.key]||0;
    const pct=t?Math.round(d/t*100):0;
    const isDone=pct===100,isActive=!isDone&&(pct>0||(i===0));
    const st=isDone?'done':isActive?'active':'idle';
    html+=`<div class="pipe-step ${st}" title="${s.name}: ${d}/${t}">
      <div class="pdot ${st}"></div>
      <div class="pipe-name">${s.name}</div>
      <div class="pipe-frac">${d}/${t}</div>
    </div>`;
    if(i<STAGES.length-1)html+=`<span class="pipe-arrow">›</span>`;
  });
  track.innerHTML=html;
  const td=TASKS.filter(t=>t.status==='done').length;
  const pct=Math.round(td/TASKS.length*100);
  document.getElementById('pipe-pct').textContent=`${pct}% · ${td}/${TASKS.length} done`;
}

function renderStats(){
  const wrap=document.getElementById('stats-row');if(!wrap)return;
  const all=TASKS;
  const inprog=all.filter(t=>t.status==='inprog').length;
  const waitqa=all.filter(t=>t.status==='readyqa'||t.status==='qaprog').length;
  const done=all.filter(t=>t.status==='done').length;
  const total=all.length;
  const pct=Math.round(done/total*100);
  const crit=all.filter(t=>t.priority==='red'&&t.status!=='done').length;

  const byM=all.filter(t=>t.assignedTo==='M');
  const byJ=all.filter(t=>t.assignedTo==='J');
  const byB=all.filter(t=>t.assignedTo==='B');

  wrap.innerHTML=
    sc(total,   'Total Tasks',    '#6366f1',Math.round(done/total*100))   +
    sc(inprog,  'In Progress',    '#f59e0b',Math.round(inprog/total*100)) +
    sc(waitqa,  'Waiting QA',     '#38bdf8',Math.round(waitqa/total*100)) +
    sc(done,    'Completed',      '#34d399',pct) +
    sc(pct+'%', 'Completion',     '#34d399',pct) +
    sc(crit,    'Critical Left',  '#f43f5e',0);

  document.getElementById('sb-all').textContent=total;
  document.getElementById('sb-m').textContent=byM.length;
  document.getElementById('sb-j').textContent=byJ.length;
  document.getElementById('sb-b').textContent=byB.length;
}
function sc(n,l,c,p){
  return`<div class="stat-card" style="">
    <div class="stat-num" style="color:${c}">${n}</div>
    <div class="stat-label">${l}</div>
    ${p>0?`<div class="stat-bar-wrap"><div class="stat-bar" style="width:${p}%;background:${c}"></div></div>`:''}
  </div>`;
}

/* ═══════════════════════════════════════════════════════
   ██████████████  KANBAN BOARD RENDERER  ██████████████
   ═══════════════════════════════════════════════════════ */
function renderBoard(){
  const board=document.getElementById('kanban-board');if(!board)return;
  const vis=visible();
  board.innerHTML='';
  COLUMNS.forEach(col=>{
    const tasks=vis.filter(t=>t.status===col.id);
    board.appendChild(buildColumn(col,tasks));
  });
  updateCounts();
  // Re-attach DnD after render
  attachDnD();
}

function renderAll(){
  renderPipeline();
  renderStats();
  renderBoard();
}

/* ── Column builder ── */
function buildColumn(col,tasks){
  const wrap=document.createElement('div');
  wrap.className='kol';
  wrap.dataset.colid=col.id;

  /* header */
  wrap.innerHTML=`
    <div class="kol-hdr">
      <div class="kol-dot" style="background:${col.color}"></div>
      <div class="kol-title">${col.label}</div>
      <div class="kol-count" id="cnt-${col.id}">${tasks.length}</div>
    </div>
    <div class="kol-cards" id="cards-${col.id}">
      ${tasks.length===0
        ? `<div class="kol-empty">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" opacity=".35"><rect x="2" y="2" width="16" height="16" rx="4" stroke="currentColor" stroke-width="1.4"/><path d="M7 10h6M10 7v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Drop tasks here
          </div>`
        : tasks.map(t=>buildCard(t)).join('')}
    </div>
    <button class="kol-add-btn" onclick="openModal('${col.id}')">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Add task
    </button>`;
  return wrap;
}

/* ── Card builder ── */
function buildCard(t){
  const days=dl(t.dueDate);
  const isDone=t.status==='done';
  const dueCls=isDone?'ddone':days<0?'dover':days<=5?'dsoon':'dok';
  const dueLabel=isDone?'Done ✓':days<0?`${Math.abs(days)}d over`:days===0?'Today':`${days}d`;
  const pm=PM[t.priority]||PM.green;
  const topColor=PTOP[t.priority]||'#6366f1';
  const subDone=t.subtasks.filter(s=>s.d).length;
  const subTotal=t.subtasks.length;

  return`<div class="kard${isDone?' is-done':''}"
    id="card-${t.id}"
    draggable="true"
    data-id="${t.id}"
    style="border-top:2.5px solid ${topColor}">
    <div class="khdr">
      <div class="kt">${t.title}</div>
      <div class="kmenu">
        <button class="kbtn" onclick="editTask('${t.id}',event)" title="Edit">✏</button>
        <button class="kbtn" onclick="delegateTask('${t.id}',event)" title="Delegate">↗</button>
        <button class="kbtn del" onclick="deleteTask('${t.id}',event)" title="Delete">✕</button>
      </div>
    </div>
    ${t.note?`<div class="knote">${t.note}</div>`:''}
    <div class="kfoot">
      <div class="ppill ${pm.cls}"><span class="ppill-dot"></span>${pm.label}</div>
      <div class="kav kav-${t.assignedTo}">${t.assignedTo}</div>
      ${subTotal>0?`<div class="ksub">${subDone}/${subTotal} tasks</div>`:''}
      <div class="kdue ${dueCls}">${dueLabel}</div>
    </div>
  </div>`;
}

function updateCounts(){
  COLUMNS.forEach(col=>{
    const el=document.getElementById('cnt-'+col.id);
    if(el)el.textContent=TASKS.filter(t=>t.status===col.id).length;
  });
}

/* ═══════════════════════════════════════════════════════
   ██████████████  DRAG AND DROP ENGINE  ████████████████
   ═══════════════════════════════════════════════════════ */
let _dragId=null;
let _dragEl=null;
let _placeholder=null;

function attachDnD(){
  document.querySelectorAll('.kard').forEach(card=>{
    card.addEventListener('dragstart',onDragStart);
    card.addEventListener('dragend',onDragEnd);
  });
  document.querySelectorAll('.kol').forEach(col=>{
    col.addEventListener('dragover',onDragOver);
    col.addEventListener('dragenter',onDragEnter);
    col.addEventListener('dragleave',onDragLeave);
    col.addEventListener('drop',onDrop);
  });
}

function onDragStart(e){
  _dragId=this.dataset.id;
  _dragEl=this;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',_dragId);
  setTimeout(()=>{if(_dragEl)_dragEl.classList.add('dragging')},0);
}

function onDragEnd(e){
  if(_dragEl)_dragEl.classList.remove('dragging');
  _dragEl=null; _dragId=null;
  removePlaceholder();
  document.querySelectorAll('.kol').forEach(c=>c.classList.remove('drag-target'));
}

function onDragEnter(e){
  e.preventDefault();
  this.classList.add('drag-target');
}

function onDragLeave(e){
  if(!this.contains(e.relatedTarget))
    this.classList.remove('drag-target');
}

function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const cardsWrap=this.querySelector('.kol-cards');
  if(!cardsWrap)return;

  // Show placeholder
  removePlaceholder();
  _placeholder=document.createElement('div');
  _placeholder.className='drop-ph';

  const afterEl=getDragAfterElement(cardsWrap, e.clientY);
  if(afterEl==null){
    cardsWrap.appendChild(_placeholder);
  } else {
    cardsWrap.insertBefore(_placeholder,afterEl);
  }
}

function onDrop(e){
  e.preventDefault();
  const destColId=this.dataset.colid;
  if(!_dragId||!destColId)return;

  const task=TASKS.find(t=>t.id===_dragId);
  if(!task)return;

  const prevStatus=task.status;
  task.status=destColId;
  saveTasks();

  this.classList.remove('drag-target');
  removePlaceholder();

  const colLabel=COLUMNS.find(c=>c.id===destColId)?.label||destColId;
  toast(`Moved to "${colLabel}"`, prevStatus===destColId?'info':'ok');

  renderAll();
}

function removePlaceholder(){
  if(_placeholder&&_placeholder.parentNode)
    _placeholder.parentNode.removeChild(_placeholder);
  _placeholder=null;
}

function getDragAfterElement(container,y){
  const draggables=[...container.querySelectorAll('.kard:not(.dragging)')];
  return draggables.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset)return{offset,element:child};
    return closest;
  },{offset:Number.NEGATIVE_INFINITY}).element||null;
}

/* ═══════════════════════════════════════════════════════
   ██████████████  TASK INTERACTIONS  ██████████████████
   ═══════════════════════════════════════════════════════ */
function deleteTask(id,e){
  e.stopPropagation();
  if(!confirm('Delete this task?'))return;
  TASKS=TASKS.filter(t=>t.id!==id);
  saveTasks();
  renderAll();
  toast('Task deleted','err');
}

function delegateTask(id,e){
  e.stopPropagation();
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  const other=t.assignedTo==='M'?'J':t.assignedTo==='J'?'B':'M';
  t.assignedTo=other;
  saveTasks();
  renderAll();
  toast(`Delegated to ${other}`,'info');
}

/* ═══════════════════════════════════════════════════════
   ██████████████  AUTO-ASSIGN / AUTO-PRIORITY  █████████
   ═══════════════════════════════════════════════════════ */
function autoAssign(title='',note=''){
  const text=(title+' '+note).toLowerCase();
  const s={M:0,J:0,B:0};
  Object.entries(KW).forEach(([k,m])=>{if(text.includes(k))s[m]++});
  let best='M',bs=-1;
  Object.entries(s).forEach(([m,v])=>{if(v>bs){bs=v;best=m}});
  return{assignedTo:best,confidence:bs};
}
function autoPriority(title=''){
  const t=title.toLowerCase();
  if(['urgent','critical','block','fail','today','asap','payment','sign','legal','deadline','overdue'].some(w=>t.includes(w)))return'red';
  if(['send','reply','follow','update','remind','check','confirm'].some(w=>t.includes(w)))return'amber';
  if(['plan','strategy','setup','register','design','review','draft','prepare','research'].some(w=>t.includes(w)))return'blue';
  return'green';
}
function previewAA(){
  const title=document.getElementById('f-title')?.value||'';
  const p=document.getElementById('aa-preview');
  const tx=document.getElementById('aa-text');
  if(title.length<3){p.style.display='none';return}
  const{assignedTo,confidence}=autoAssign(title);
  p.style.display='block';
  tx.textContent=`Auto-assign → ${assignedTo} (${MEMBERS[assignedTo].role})${confidence===0?' · no keyword, defaulted':''}`;
}

/* ═══════════════════════════════════════════════════════
   ██████████████  MODAL  ██████████████████████████████
   ═══════════════════════════════════════════════════════ */
let _editId=null;

function openModal(colId=''){
  _editId=null;
  document.getElementById('f-title').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-days').value='7';
  document.getElementById('f-assign').value='';
  document.getElementById('f-priority').value='';
  document.getElementById('f-stage').value='validate';
  document.getElementById('f-phase').value='';
  document.getElementById('f-status').value=colId||'todo';
  document.getElementById('aa-preview').style.display='none';
  document.getElementById('m-title').textContent='Add Task';
  document.getElementById('m-save-btn').textContent='Add Task';
  document.getElementById('m-save-btn').onclick=saveTask;
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('f-title').focus(),50);
}

function closeModal(){
  document.getElementById('modal').style.display='none';
  _editId=null;
}

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('Title is required','err');return}
  const note=document.getElementById('f-note').value.trim();
  const days=parseInt(document.getElementById('f-days').value)||7;
  const overAssign=document.getElementById('f-assign').value;
  const overPriority=document.getElementById('f-priority').value;
  const status=document.getElementById('f-status').value||'todo';
  const stage=document.getElementById('f-stage').value||'validate';
  const phase=document.getElementById('f-phase').value.trim()||'TASKS';

  if(_editId){
    const t=TASKS.find(x=>x.id===_editId);if(!t)return;
    t.title=title; t.note=note; t.phase=phase; t.stage=stage; t.status=status;
    t.assignedTo=overAssign||t.assignedTo;
    t.priority=overPriority||t.priority;
    t.dueDate=new Date(Date.now()+days*86400000).toISOString();
    saveTasks(); closeModal(); renderAll();
    toast('Task updated','ok');
  } else {
    const{assignedTo}=autoAssign(title,note);
    const task={
      id:gid(),phase,title,note,status,stage,subtasks:[],
      assignedTo:overAssign||assignedTo,
      priority:overPriority||autoPriority(title),
      dueDate:new Date(Date.now()+days*86400000).toISOString(),
    };
    TASKS.push(task);
    saveTasks(); closeModal(); renderAll();
    toast('Task added → '+task.assignedTo,'ok');
  }
}

function editTask(id,e){
  e.stopPropagation();
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  _editId=id;
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-note').value=t.note||'';
  document.getElementById('f-days').value=Math.max(1,dl(t.dueDate));
  document.getElementById('f-assign').value=t.assignedTo;
  document.getElementById('f-priority').value=t.priority==='yellow'?'amber':t.priority;
  document.getElementById('f-stage').value=t.stage;
  document.getElementById('f-phase').value=t.phase;
  document.getElementById('f-status').value=t.status;
  previewAA();
  document.getElementById('m-title').textContent='Edit Task';
  document.getElementById('m-save-btn').textContent='Save Changes';
  document.getElementById('m-save-btn').onclick=saveTask;
  document.getElementById('modal').style.display='flex';
}

/* ═══════════════════════════════════════════════════════
   ██████████████  TOAST  ██████████████████████████████
   ═══════════════════════════════════════════════════════ */
function toast(msg,type='info'){
  const icons={ok:'✓',err:'✕',info:'→'};
  const cls={ok:'tok',err:'terr',info:'tnfo'};
  const el=document.createElement('div');
  el.className=`toast ${cls[type]||'tnfo'}`;
  el.innerHTML=`<span>${icons[type]||'→'}</span>${msg}`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

/* ═══════════════════════════════════════════════════════
   ██████████████  DATE / DAY BADGE  ███████████████████
   ═══════════════════════════════════════════════════════ */
function initDay(){
  const dayEl=document.getElementById('top-day');
  const subEl=document.getElementById('pg-sub');
  const now=new Date();
  const dayNum=Math.ceil((now-START)/86400000);
  const fmt=now.toLocaleDateString('en-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  if(dayEl)dayEl.textContent=`Day ${dayNum} · ${fmt}`;
  if(subEl)subEl.textContent=`Day ${dayNum} · Kanban Workflow · Friction OS`;

  // Header board summary badges
  const hdr=document.getElementById('hdr-acts');
  const done=TASKS.filter(t=>t.status==='done').length;
  const total=TASKS.length;
  const pct=Math.round(done/total*100);
  if(hdr){
    hdr.innerHTML=`
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="btn" style="pointer-events:none;color:var(--ind);border-color:var(--acc-bd)">${total} tasks</div>
        <div class="btn" style="pointer-events:none;color:var(--high);border-color:rgba(245,158,11,.25)">${TASKS.filter(t=>t.status==='inprog').length} in progress</div>
        <div class="btn" style="pointer-events:none;color:var(--low);border-color:rgba(52,211,153,.25)">${done} done · ${pct}%</div>
      </div>`;
  }
}

/* ═══════════════════════════════════════════════════════
   ██████████████  KEYBOARD SHORTCUTS  █████████████████
   ═══════════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openModal()}
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('srch').focus()}
});

/* ═══════════════════════════════════════════════════════
   ██████████████  INIT  ████████████████████████████████
   ═══════════════════════════════════════════════════════ */
initDay();
renderAll();
</script>
